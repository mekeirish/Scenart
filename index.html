<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scenart Studio</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #00e5ff;
            --recording-color: #ff3d00;
            --play-color: #00e676;
            --btn-color: #2979ff;
            --delete-color: #ff1744;
            --text-main: #e0e0e0;
        }

        body {
            font-family: 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
            touch-action: none;
            user-select: none;
        }

        #status-info {
            background: linear-gradient(145deg, #1a1a1a, #252525);
            padding: 12px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 10px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 800;
            color: var(--accent-color);
            box-shadow: inset 2px 2px 5px #000;
            text-transform: uppercase;
        }

        #download-zone { height: 40px; text-align: center; margin-bottom: 10px; }
        #dl-link {
            color: #fff; background: var(--btn-color);
            padding: 8px 20px; border-radius: 30px;
            text-decoration: none; font-size: 0.75rem; font-weight: bold;
            display: none; box-shadow: 0 4px 15px rgba(41, 121, 255, 0.3);
        }

        .top-bar {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .action-btn {
            padding: 14px 5px; border: none; border-radius: 12px;
            color: white; font-weight: 700; font-size: 0.65rem;
            text-transform: uppercase;
        }

        .tools {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 35px;
            margin-bottom: 20px;
        }

        .dot-btn {
            width: 55px;
            height: 55px;
            border-radius: 18px;
            background: var(--card-bg);
            border: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 4px 4px 10px #080808, -2px -2px 8px #2a2a2a;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
        }

        /* Icônes Vectorielles (SVG) */
        .icon {
            width: 24px;
            height: 24px;
            fill: white;
            transition: transform 0.2s;
        }

        .dot-btn:active { transform: scale(0.9); }
        .dot-btn:active .icon { transform: rotate(-10deg); }

        .dot-btn.active {
            background: var(--delete-color);
            box-shadow: 0 0 20px var(--delete-color);
            border-color: #fff;
        }

        .c-1 { background: linear-gradient(135deg, #43a047, #1b5e20); }
        .c-2 { background: linear-gradient(135deg, #f4511e, #b71c1c); }
        .c-3 { background: linear-gradient(135deg, #1e88e5, #0d47a1); }

        .header-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 10px; }
        .p-name {
            background: var(--card-bg); border-bottom: 2px solid var(--accent-color);
            color: var(--text-main); padding: 10px 2px; border-radius: 6px 6px 0 0;
            font-size: 0.65rem; text-align: center; font-weight: bold;
        }

        .grid-container {
            display: grid; grid-template-columns: repeat(4, 1fr);
            gap: 8px; flex-grow: 1; overflow-y: auto; padding-right: 4px;
        }

        .col { display: flex; flex-direction: column; gap: 8px; }

        .cell {
            background: #252525; border: 1px solid #333; border-radius: 8px;
            min-height: 50px; transition: all 0.2s; position: relative;
        }

        .cell.filled { background: #2c2c2c; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); }
        .cell.filled::after {
            content: ''; position: absolute; left: 15%; right: 15%; top: 50%;
            height: 2px; background: var(--accent-color); opacity: 0.3;
        }

        .cell.rec { background: var(--recording-color) !important; animation: pulse-red 1s infinite; }
        .cell.play { 
            background: var(--play-color) !important; 
            box-shadow: 0 0 20px var(--play-color);
            border-color: #fff;
            z-index: 2;
        }

        .cell.drag { opacity: 0.9; transform: scale(1.05); z-index: 100; box-shadow: 0 10px 20px rgba(0,0,0,0.5); }

        @keyframes pulse-red { 
            0% { box-shadow: 0 0 0 0px rgba(255, 75, 43, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(255, 75, 43, 0); }
            100% { box-shadow: 0 0 0 0px rgba(255, 75, 43, 0); }
        }

        .signature { text-align: center; font-size: 0.6rem; color: #555; padding: 10px 0; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="status-info">STUDIO SCENART</div>
    
    <div id="download-zone">
        <a id="dl-link">⬇ EXPORTATION PRÊTE</a>
    </div>

    <div class="top-bar">
        <button class="action-btn c-1" onclick="f_mix()">1. Mixer</button>
        <button class="action-btn c-2" onclick="f_listen()">2. Play</button>
        <button class="action-btn c-3" onclick="f_prepare_save()">3. Save</button>
    </div>

    <div class="tools">
        <div id="e-tool" class="dot-btn" onclick="f_eraser()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M16.24,3.56L21.19,8.51C21.97,9.29 21.97,10.55 21.19,11.34L12,20.53C10.44,22.09 7.91,22.09 6.34,20.53L2.81,17C1.25,15.44 1.25,12.91 2.81,11.34L10.59,3.56C11.37,2.78 12.63,2.78 13.41,3.56L16.24,3.56M11.3,5.68L4.22,12.76C3.44,13.54 3.44,14.8 4.22,15.58L7.76,19.11C8.54,19.9 9.8,19.9 10.59,19.11L17.67,12.04L11.3,5.68Z"/></svg>
        </div>
        <div class="dot-btn" onclick="f_reset()">
            <svg class="icon" viewBox="0 0 24 24"><path d="M17.65,6.35C16.2,4.9 14.21,4 12,4A8,8 0 0,0 4,12A8,8 0 0,0 12,20C15.73,20 18.84,17.45 19.73,14H17.65C16.83,16.33 14.61,18 12,18A6,6 0 0,1 6,12A6,6 0 0,1 12,6C13.66,6 15.14,6.69 16.22,7.78L13,11H20V4L17.65,6.35Z"/></svg>
        </div>
    </div>

    <div class="header-grid" id="h-row"></div>
    <div class="grid-container" id="g-row"></div>

    <div class="signature">L.B © 2026 — PARIS</div>

    <script>
        const info = document.getElementById('status-info');
        const dlLink = document.getElementById('dl-link');
        let m_rec, a_chunks = [], a_slot = null, state = "IDLE";
        let main_buf = null, d_target = null, d_timer = null, s_y = 0, e_mode = false;

        const ctx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });

        for (let i = 0; i < 4; i++) {
            const h = document.createElement('div');
            h.className = 'p-name'; h.innerText = "VOIX " + (i+1);
            h.onclick = () => { let n = prompt("Nom du personnage :"); if(n) h.innerText = n; };
            document.getElementById('h-row').appendChild(h);
            const c = document.createElement('div');
            c.className = 'col'; document.getElementById('g-row').appendChild(c);
        }
        
        f_lines(10);

        function f_lines(n) {
            const cols = document.getElementById('g-row').children;
            for (let i = 0; i < n; i++) {
                for (let j = 0; j < 4; j++) {
                    const b = document.createElement('button');
                    b.className = 'cell'; f_touch(b); cols[j].appendChild(b);
                }
            }
        }

        function f_check() {
            const cols = document.getElementById('g-row').children;
            let last = -1;
            for (let r = 0; r < cols[0].children.length; r++) {
                for (let c = 0; c < 4; c++) { if (cols[c].children[r].buf) last = r; }
            }
            if ((cols[0].children.length - 1 - last) < 4) f_lines(4);
        }

        function f_eraser() {
            e_mode = !e_mode;
            document.getElementById('e-tool').classList.toggle('active', e_mode);
            info.innerText = e_mode ? "MODE GOMME" : "STUDIO SCENART";
        }

        function f_reset() {
            if(!confirm("Supprimer tous les enregistrements ?")) return;
            document.querySelectorAll('.cell').forEach(c => { delete c.buf; c.classList.remove('filled', 'play'); });
            main_buf = null; dlLink.style.display = "none"; info.innerText = "STUDIO VIDÉ";
        }

        async function f_mix() {
            const cols = document.getElementById('g-row').children;
            let bufs = [];
            for (let r = 0; r < cols[0].children.length; r++) {
                for (let c = 0; c < 4; c++) { if (cols[c].children[r].buf) bufs.push(cols[c].children[r].buf); }
            }
            if (bufs.length === 0) return;
            let len = bufs.reduce((a, b) => a + b.length, 0);
            let out = ctx.createBuffer(1, len, 44100);
            let off = 0;
            for (const b of bufs) { out.getChannelData(0).set(b.getChannelData(0), off); off += b.length; }
            main_buf = out; info.innerText = "✅ MIXAGE TERMINÉ";
        }

        async function f_listen() {
            if (!main_buf) { info.innerText = "MIXEZ D'ABORD"; return; }
            const cols = document.getElementById('g-row').children;
            let playlist = [];
            for (let r = 0; r < cols[0].children.length; r++) {
                for (let c = 0; c < 4; c++) { 
                    if (cols[c].children[r].buf) playlist.push({buf: cols[c].children[r].buf, el: cols[c].children[r]}); 
                }
            }
            info.innerText = "LECTURE DU MIX...";
            for (const item of playlist) {
                item.el.classList.add('play');
                await new Promise(resolve => {
                    const s = ctx.createBufferSource();
                    s.buffer = item.buf; s.connect(ctx.destination);
                    s.onended = () => { item.el.classList.remove('play'); resolve(); };
                    s.start();
                });
            }
            info.innerText = "FIN DE LECTURE";
        }

        function f_prepare_save() {
            if (!main_buf) { info.innerText = "MIXEZ D'ABORD"; return; }
            const data = f_wav(main_buf);
            const blob = new Blob([data], { type: "audio/wav" });
            const url = URL.createObjectURL(blob);
            dlLink.href = url; dlLink.download = "scenart_studio.wav";
            dlLink.style.display = "inline-block";
            info.innerText = "PRÊT À TÉLÉCHARGER";
        }

        function f_wav(ab) {
            let n = ab.numberOfChannels, len = ab.length * n * 2 + 44, b = new ArrayBuffer(len), v = new DataView(b), ch = [], i, s, off = 0, p = 0;
            const u16 = (d) => { v.setUint16(p, d, true); p += 2; };
            const u32 = (d) => { v.setUint32(p, d, true); p += 4; };
            u32(0x46464952); u32(len - 8); u32(0x45564157); u32(0x20746d66); u32(16); u16(1); u16(n);
            u32(ab.sampleRate); u32(ab.sampleRate * 2 * n); u16(n * 2); u16(16); u32(0x61746164); u32(len - p - 4);
            for (i = 0; i < n; i++) ch.push(ab.getChannelData(i));
            while (p < len) {
                for (i = 0; i < n; i++) {
                    s = Math.max(-1, Math.min(1, ch[i][off]));
                    s = (s < 0 ? s * 0x8000 : s * 0x7FFF);
                    v.setInt16(p, s, true); p += 2;
                }
                off++;
            }
            return b;
        }

        function f_touch(b) {
            b.addEventListener('touchstart', (e) => {
                if (state !== "IDLE") return;
                s_y = e.touches[0].clientY;
                if (b.buf && !e_mode) d_timer = setTimeout(() => { d_target = b; b.classList.add('drag'); }, 400);
            });
            b.addEventListener('touchmove', (e) => {
                if (!d_target) return;
                e.preventDefault();
                let dy = e.touches[0].clientY - s_y;
                d_target.style.transform = `translateY(${dy}px)`;
                let h = document.elementFromPoint(e.touches[0].clientX, e.touches[0].clientY);
                if (h && h.classList.contains('cell') && h !== d_target) {
                    const c = d_target.parentElement;
                    if (h.parentElement === c) {
                        const kids = Array.from(c.children);
                        if (kids.indexOf(d_target) < kids.indexOf(h)) c.insertBefore(d_target, h.nextSibling);
                        else c.insertBefore(d_target, h);
                        s_y = e.touches[0].clientY;
                    }
                }
            }, {passive: false});
            b.addEventListener('touchend', (e) => {
                clearTimeout(d_timer);
                if (d_target) { d_target.classList.remove('drag'); d_target.style.transform = ""; d_target = null; }
                else if (Math.abs(e.changedTouches[0].clientY - s_y) < 10) f_act(b);
            });
        }

        function f_act(c) {
            if (e_mode) { if (c.buf) { delete c.buf; c.classList.remove('filled'); } return; }
            if (state === "REC" && a_slot === c) f_stop();
            else if (state === "IDLE") { if (c.buf) f_play(c); else f_start(c); }
        }

        async function f_start(c) {
            try {
                const s = await navigator.mediaDevices.getUserMedia({ audio: true });
                m_rec = new MediaRecorder(s); a_chunks = [];
                m_rec.ondataavailable = e => a_chunks.push(e.data);
                m_rec.onstop = async () => {
                    const b = new Blob(a_chunks);
                    const ab = await b.arrayBuffer();
                    c.buf = await ctx.decodeAudioData(ab);
                    c.classList.add('filled'); f_check();
                };
                m_rec.start(); state = "REC"; a_slot = c; c.classList.add('rec');
                info.innerText = "ENREGISTREMENT...";
            } catch (err) { info.innerText = "ERREUR MICRO"; }
        }

        function f_stop() { m_rec.stop(); a_slot.classList.remove('rec'); state = "IDLE"; a_slot = null; info.innerText = "STUDIO SCENART"; }

        function f_play(c) {
            const s = ctx.createBufferSource(); s.buffer = c.buf; s.connect(ctx.destination);
            state = "PLAY"; a_slot = c; c.classList.add('play');
            s.start(); s.onended = () => { c.classList.remove('play'); state = "IDLE"; a_slot = null; };
        }
    </script>
</body>
</html>
